<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 280" role="img" aria-label="nobots">
  <defs>
    <clipPath id="card"><rect x="0" y="0" width="840" height="280" rx="26"/></clipPath>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF9F4"/>
      <stop offset="1" stop-color="#EFE9DC"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#card)">
    <rect x="0" y="0" width="840" height="280" fill="url(#paper)"/>
    <!-- faint manuscript rules -->
    <g stroke="#1A1A1A" stroke-opacity="0.06" stroke-width="2">
      <line x1="270" y1="196" x2="792" y2="196"/>
      <line x1="270" y1="222" x2="792" y2="222"/>
      <line x1="270" y1="248" x2="792" y2="248"/>
    </g>

    <!-- left mark: robot head inside a prohibition circle -->
    <g transform="translate(140,140)">
      <!-- robot -->
      <g fill="none" stroke="#141414" stroke-width="8" stroke-linejoin="round" stroke-linecap="round">
        <line x1="0" y1="-58" x2="0" y2="-44"/>
        <circle cx="0" cy="-64" r="7" fill="#141414" stroke="none"/>
        <rect x="-44" y="-44" width="88" height="78" rx="16" fill="#FBF9F4"/>
        <rect x="-26" y="-20" width="18" height="18" rx="4" fill="#141414" stroke="none"/>
        <rect x="8" y="-20" width="18" height="18" rx="4" fill="#141414" stroke="none"/>
        <line x1="-22" y1="16" x2="22" y2="16"/>
      </g>
      <!-- prohibition ring + slash -->
      <circle cx="0" cy="0" r="86" fill="none" stroke="#D7263D" stroke-width="13"/>
      <line x1="-60.8" y1="-60.8" x2="60.8" y2="60.8" stroke="#D7263D" stroke-width="13" stroke-linecap="round"/>
    </g>

    <!-- wordmark -->
    <text x="266" y="170" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="118" font-weight="800" letter-spacing="-4" fill="#141414">nobots</text>
    <!-- accent strike through the 'o' pair echoes the ban on the em dash -->
    <line x1="300" y1="132" x2="470" y2="132" stroke="#D7263D" stroke-width="9" stroke-linecap="round" stroke-opacity="0.0"/>
    <!-- tagline -->
    <text x="270" y="216" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="600" letter-spacing="0.5" fill="#8A1020">write like a human. dodge the detectors.</text>
  </g>
</svg>
