<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 280" role="img" aria-label="nobots">
  <defs>
    <clipPath id="card"><rect x="0" y="0" width="840" height="280" rx="26"/></clipPath>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141418"/>
      <stop offset="1" stop-color="#0B0B0D"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#card)">
    <rect x="0" y="0" width="840" height="280" fill="url(#ink)"/>
    <!-- faint manuscript rules -->
    <g stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="2">
      <line x1="270" y1="196" x2="792" y2="196"/>
      <line x1="270" y1="222" x2="792" y2="222"/>
      <line x1="270" y1="248" x2="792" y2="248"/>
    </g>

    <!-- left mark: robot head inside a prohibition circle -->
    <g transform="translate(140,140)">
      <g fill="none" stroke="#F2ECE3" stroke-width="8" stroke-linejoin="round" stroke-linecap="round">
        <line x1="0" y1="-58" x2="0" y2="-44"/>
        <circle cx="0" cy="-64" r="7" fill="#F2ECE3" stroke="none"/>
        <rect x="-44" y="-44" width="88" height="78" rx="16" fill="#0B0B0D"/>
        <rect x="-26" y="-20" width="18" height="18" rx="4" fill="#F2ECE3" stroke="none"/>
        <rect x="8" y="-20" width="18" height="18" rx="4" fill="#F2ECE3" stroke="none"/>
        <line x1="-22" y1="16" x2="22" y2="16"/>
      </g>
      <circle cx="0" cy="0" r="86" fill="none" stroke="#FF3B5C" stroke-width="13"/>
      <line x1="-60.8" y1="-60.8" x2="60.8" y2="60.8" stroke="#FF3B5C" stroke-width="13" stroke-linecap="round"/>
    </g>

    <!-- wordmark -->
    <text x="266" y="170" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="118" font-weight="800" letter-spacing="-4" fill="#F2ECE3">nobots</text>
    <!-- tagline -->
    <text x="270" y="216" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="600" letter-spacing="0.5" fill="#FF8FA3">write like a human. dodge the detectors.</text>
  </g>
</svg>
